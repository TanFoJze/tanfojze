<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LamdaGames Tanfojze</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        body {
            background: #121212;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background 0.3s;
        }
        body.light {
            background: #f6f6f6;
            color: #222;
        }

        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 54px;
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(12px);
            display: flex; align-items: center;
            padding: 0 16px;
            z-index: 999;
            transition: background 0.3s;
        }
        body.light .top-bar {
            background: rgba(255,255,255,0.85);
        }

        .logo {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            overflow: hidden;
            margin-right: 10px;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .title-group {
            display: flex; align-items: center; gap: 8px;
        }
        .site-title {
            font-size: 18px; font-weight: 600;
        }
        .dev-tag {
            font-size: 12px; color: #999;
            display: flex; align-items: center; gap: 4px;
        }
        .dev-tag::after {
            content: '▼'; font-size: 8px; color: #888;
        }

        .spacer { flex: 1; }

        .top-btn {
            width: 36px; height: 36px;
            display: grid; place-items: center;
            border-radius: 50%; cursor: pointer;
            font-size: 16px;
        }

        .header {
            padding-top: 70px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-inline: 24px;
            position: relative;
            z-index: 0;
        }

        /* 背景图：宽度铺满，高等比缩放，上实下透 */
        .header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("bg.jpg");
            background-repeat: no-repeat;
            background-size: 100% auto;
            background-position: center top;
            z-index: -1;
            -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 70%, transparent 100%);
            mask-image: linear-gradient(to bottom, #000 0%, #000 70%, transparent 100%);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        .slogan {
            font-size: 14px; color: #888;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        body.light .slogan { color: #666; }

        .search-row {
            width: 100%; max-width: 420px;
            display: flex; gap: 10px;
            margin-bottom: 16px;
        }
        .search-row input {
            flex: 1; padding: 14px 18px;
            border-radius: 16px; border: none;
            background: rgba(255,255,255,0.08);
            color: #fff; font-size: 16px; outline: none;
        }
        body.light .search-row input {
            background: #fff; color: #222;
            box-shadow: 0 1px 4px #0001;
        }
        .search-row button {
            padding: 14px 16px;
            border-radius: 16px; border: none;
            background: rgba(255,255,255,0.08);
            color: #fff; cursor: pointer;
        }
        body.light .search-row button {
            background: #fff; color: #222;
        }

        .shortcuts {
            width: 100%; max-width: 420px;
            display: flex; gap: 10px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .shortcuts::-webkit-scrollbar { height: 0; }
        .shortcut {
            min-width: 60px; padding: 10px 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 12px; text-align: center;
            font-size: 12px; color: #ccc;
            white-space: nowrap;
        }
        body.light .shortcut {
            background: #fff; color: #444;
        }

        .scroll-tip {
            font-size: 12px; color: #888;
            margin-bottom: 10px;
        }

        .carousel {
            width: 100%;
            max-width: 420px;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            margin-bottom: 10px;
        }
        .carousel::-webkit-scrollbar { height: 0; }
        .carousel-item {
            width: 280px;
            height: 160px;
            flex-shrink: 0;
            border-radius: 16px;
            object-fit: cover;
            filter: brightness(0.5);
            transition: all 0.4s ease;
        }
        .carousel-item.active {
            height: 180px;
            filter: brightness(1);
        }

        .list {
            padding: 10px 24px 80px;
            display: flex; flex-direction: column; gap: 14px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.6s;
        }
        .list.show {
            opacity: 1; visibility: visible;
        }
        .item {
            padding: 20px; border-radius: 16px;
            background: rgba(255,255,255,0.06);
            opacity: 0; transform: translateY(60px);
            transition: all 0.5s;
        }
        body.light .item { background: #fff; }
        .item.show { opacity: 1; transform: translateY(0); }
        .item.left { width: 75%; align-self: flex-start; }
        .item.right { width: 75%; align-self: flex-end; }

        .carousel.hide {
            opacity: 0; visibility: hidden;
            height: 0; margin: 0;
        }

        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 9999;
        }
        .toast.show { opacity: 1; pointer-events: auto; }
    </style>
</head>

<body>

<div class="top-bar">
    <div class="logo">
        <img src="favicon.png" alt="Logo">
    </div>
    <div class="title-group">
        <div class="site-title">LamdaGames</div>
        <div class="dev-tag">开发人员</div>
    </div>
    <div class="spacer"></div>

    <div class="top-btn" id="musicBtn">♫</div>
    <div class="top-btn" id="themeBtn">昼</div>
    <div class="top-btn" id="fullBtn">⛶</div>
    <div class="top-btn menu-toggle">☰</div>
</div>

<div class="toast" id="toast">该内容不存在</div>

<div class="header">
    <h1>TanFoJze</h1>
    <div class="slogan">x仕x.Looking forward to tomorrow</div>

    <div class="search-row">
        <input placeholder="搜索..." type="text" id="searchInput">
        <button id="searchBtn">搜索</button>
    </div>

    <div class="shortcuts">
        <div class="shortcut">应用</div>
        <div class="shortcut">开源</div>
        <div class="shortcut">终端</div>
        <div class="shortcut">资源</div>
        <div class="shortcut">图片</div>
        <div class="shortcut">网站</div>
        <div class="shortcut">更多</div>
    </div>

    <div class="scroll-tip">︿ 向上滑动展开列表</div>

    <div class="carousel" id="carousel">
        <img src="jh000gif.gif" class="carousel-item active">
        <img src="jh000gif.gif" class="carousel-item">
        <img src="jh000gif.gif" class="carousel-item">
    </div>
</div>

<div class="list" id="list">
    <div class="item left">选项 01</div>
    <div class="item right">选项 02</div>
    <div class="item left">选项 03</div>
    <div class="item right">选项 04</div>
    <div class="item left">选项 05</div>
    <div class="item right">选项 06</div>
</div>

<audio id="bgm" loop preload="auto">
    <source src="bgm.mp3" type="audio/mpeg">


<script>
    const toast = document.getElementById('toast');
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    searchBtn.onclick = () => {
        const v = searchInput.value.trim();
        showToast('该内容不存在');
    };

    const themeBtn = document.getElementById('themeBtn');
    themeBtn.onclick = () => {
        document.body.classList.toggle('light');
        themeBtn.textContent = document.body.classList.contains('light') ? '夜' : '昼';
    };

    const fullBtn = document.getElementById('fullBtn');
    fullBtn.onclick = () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    };

    // 背景音乐：默认自动播放，可开关
    const bgm = document.getElementById('bgm');
    const musicBtn = document.getElementById('musicBtn');
    let playing = true;

    window.addEventListener('load', () => {
        bgm.play().catch(err => {});
    });

    musicBtn.onclick = () => {
        if (playing) {
            bgm.pause();
            musicBtn.textContent = '♪';
        } else {
            bgm.play();
            musicBtn.textContent = '♫';
        }
        playing = !playing;
    };

    const carousel = document.getElementById('carousel');
    function updateActive() {
        const items = document.querySelectorAll('.carousel-item');
        const rect = carousel.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        items.forEach(el => {
            const r = el.getBoundingClientRect();
            const c = r.left + r.width / 2;
            if (Math.abs(c - center) < r.width / 1.5) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
    }
    carousel.addEventListener('scroll', updateActive);
    updateActive();

    const list = document.getElementById('list');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 100) {
            carousel.classList.add('hide');
            list.classList.add('show');
            showItems();
        } else {
            carousel.classList.remove('hide');
            list.classList.remove('show');
            resetItems();
        }
    });

    let cur = 0;
    const items = document.querySelectorAll('.item');
    function showItems() {
        if (cur >= items.length) return;
        items[cur].classList.add('show');
        cur++;
        setTimeout(showItems, 140);
    }
    function resetItems() {
        items.forEach(i => i.classList.remove('show'));
        cur = 0;
    }
</script>
</body>
</html>
