<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TanFoJze-xsx2024:个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #252525;
            color: #fff;
            font-family: Arial, sans-serif;
            padding-bottom: 60px;
        }
        .header {
            text-align: center;
            padding: 60px 20px 30px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .slogan {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 25px;
        }
        .search-box {
            width: 85%;
            max-width: 400px;
            margin: 0 auto;
        }
        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            background: #333;
            color: #fff;
        }
        .list {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .item {
            background: #333;
            padding: 18px 20px;
            border-radius: 10px;
        }
        .item.left-long {
            width: 75%;
            align-self: flex-start;
        }
        .item.right-long {
            width: 75%;
            align-self: flex-end;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>TanFoJze - 个人主页</h1>
    <div class="slogan">明天会更好，向往美好</div>

    <div class="search-box">
        <input type="text" placeholder="搜索...">
    </div>
</div>

<div class="list">
    <!-- 左长右短、左短右长 交替 20 个 -->
    <div class="item left-long">选项 01</div>
    <div class="item right-long">选项 02</div>
    <div class="item left-long">选项 03</div>
    <div class="item right-long">选项 04</div>
    <div class="item left-long">选项 05</div>
    <div class="item right-long">选项 06</div>
    <div class="item left-long">选项 07</div>
    <div class="item right-long">选项 08</div>
    <div class="item left-long">选项 09</div>
    <div class="item right-long">选项 10</div>
    <div class="item left-long">选项 11</div>
    <div class="item right-long">选项 12</div>
    <div class="item left-long">选项 13</div>
    <div class="item right-long">选项 14</div>
    <div class="item left-long">选项 15</div>
    <div class="item right-long">选项 16</div>
    <div class="item left-long">选项 17</div>
    <div class="item right-long">选项 18</div>
    <div class="item left-long">选项 19</div>
    <div class="item right-long">选项 20</div>
</div>

</body>
</html>
