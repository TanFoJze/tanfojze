<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>TanFoJze - 开发者个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 顶部区域 */
        .header {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            background: radial-gradient(ellipse top, #2a2a2a, #1a1a1a);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .slogan {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
        }

        /* 搜索栏 */
        .search-row {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .search-row input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            outline: none;
            backdrop-filter: blur(10px);
            transition: .3s;
        }
        .search-row input:focus {
            border-color: rgba(130, 170, 255, 0.4);
            background: rgba(255,255,255,0.12);
        }
        .search-row button {
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: .3s;
        }
        .search-row button:hover {
            background: rgba(255,255,255,0.15);
        }

        /* 上滑提示 */
        .scroll-tip {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
            animation: upDown 1.8s infinite alternate ease-in-out;
        }
        @keyframes upDown {
            from { transform: translateY(0); opacity: 0.5; }
            to   { transform: translateY(-6px); opacity: 1; }
        }

        /* GIF 区域 */
        .gif-box {
            width: 100%;
            max-width: 260px;
            transition: all 0.5s ease;
            transform-origin: center;
        }
        .gif-box img {
            width: 100%;
            height: auto;
            border-radius: 14px;
            display: block;
        }
        .gif-box.hide {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8);
            height: 0;
            margin: 0;
        }

        /* 选项列表 */
        .list {
            padding: 20px 24px 80px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease;
        }
        .list.show {
            opacity: 1;
            visibility: visible;
        }

        .item {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 20px 22px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 0;
            transform: translateY(60px);
        }
        .item.show {
            opacity: 1;
            transform: translateY(0);
        }
        .item:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(130, 170, 255, 0.2);
            transform: scale(1.02);
        }
        .item.left-long {
            width: 76%;
            align-self: flex-start;
        }
        .item.right-long {
            width: 76%;
            align-self: flex-end;
        }

        /* 顶部提示 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            background: rgba(255, 80, 80, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 9999;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: all 0.4s ease;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>

<div class="toast" id="toast">该内容不存在</div>

<div class="header">
    <h1>TanFoJze - 开发者个人主页</h1>
    <div class="slogan">明天会更好，向往美好</div>

    <div class="search-row">
        <input type="text" id="searchInput" placeholder="搜索...">
        <button id="searchBtn">搜索</button>
    </div>

    <div class="scroll-tip">↑ 向上滑动探索更多</div>

    <!-- GIF 你自己在这里改文件名 -->
    <div class="gif-box" id="gifBox">
        <img src="jh000gif.gif" alt="Planet">
    </div>
</div>

<div class="list" id="list">
    <div class="item left-long">选项 01</div>
    <div class="item right-long">选项 02</div>
    <div class="item left-long">选项 03</div>
    <div class="item right-long">选项 04</div>
    <div class="item left-long">选项 05</div>
    <div class="item right-long">选项 06</div>
    <div class="item left-long">选项 07</div>
    <div class="item right-long">选项 08</div>
    <div class="item left-long">选项 09</div>
    <div class="item right-long">选项 10</div>
    <div class="item left-long">选项 11</div>
    <div class="item right-long">选项 12</div>
    <div class="item left-long">选项 13</div>
    <div class="item right-long">选项 14</div>
    <div class="item left-long">选项 15</div>
    <div class="item right-long">选项 16</div>
    <div class="item left-long">选项 17</div>
    <div class="item right-long">选项 18</div>
    <div class="item left-long">选项 19</div>
    <div class="item right-long">选项 20</div>
</div>

<script>
    // 搜索提示
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const toast = document.getElementById('toast');
    let toastTimer;

    function showToast() {
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
    }
    function doSearch() {
        const val = searchInput.value.trim();
        if (val) showToast();
    }
    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
    });

    // 滑动逻辑
    const gifBox = document.getElementById('gifBox');
    const list = document.getElementById('list');
    const items = document.querySelectorAll('.item');
    let current = 0;

    window.addEventListener('scroll', () => {
        const y = window.scrollY;
        if (y > 90) {
            gifBox.classList.add('hide');
            list.classList.add('show');
            showItems();
        } else {
            gifBox.classList.remove('hide');
            list.classList.remove('show');
            resetItems();
        }
    });

    // 逐个弹出
    function showItems() {
        if (current >= items.length) return;
        const rect = items[current].getBoundingClientRect();
        if (rect.top < window.innerHeight - 100) {
            items[current].classList.add('show');
            current++;
            setTimeout(showItems, 130);
        }
    }
    function resetItems() {
        items.forEach(i => i.classList.remove('show'));
        current = 0;
    }
</script>

</body>
</html>
