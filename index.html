<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LamdaGames Tanfojze</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 全局禁止滚动条 */
        *::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding-bottom: 70px;
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }
        body {
            background: #121212;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background 0.3s;
            position: relative;
        }
        body.light {
            background: #f6f6f6;
            color: #222;
        }
        body.sidebar-open {
            overflow: hidden;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 998;
        }

        .sidebar-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 997;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        body.light .sidebar-mask {
            background: rgba(255,255,255,0.7);
        }
        .sidebar-mask.show {
            opacity: 1;
            pointer-events: auto;
        }

        .center-time-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            padding: 24px;
            background: rgba(30,30,30,0.95);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            z-index: 1000;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        body.light .center-time-box {
            background: rgba(255,255,255,0.95);
        }
        .center-time-box.show {
            opacity: 1;
            pointer-events: auto;
        }
        .time-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: grid;
            place-items: center;
            cursor: pointer;
            font-size: 14px;
        }
        body.light .time-close {
            background: rgba(0,0,0,0.1);
        }
        .center-date {
            font-size: 15px;
            margin-bottom: 6px;
            opacity: 0.9;
        }
        .center-week {
            font-size: 20px;
            font-weight: 600;
        }

        .left-sidebar, .right-sidebar {
            position: fixed;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(16px);
            z-index: 998;
            padding: 20px 20px 40px;
            transition: transform 0.35s ease;
            overflow-y: auto;
        }
        body.light .left-sidebar, body.light .right-sidebar {
            background: rgba(255,255,250,0.95);
        }
        .left-sidebar {
            left: 0;
            transform: translateX(-100%);
        }
        .right-sidebar {
            right: 0;
            transform: translateX(100%);
        }
        .left-sidebar.show {
            transform: translateX(0);
        }
        .right-sidebar.show {
            transform: translateX(0);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        body.light .sidebar-header {
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
        }
        .sidebar-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: grid;
            place-items: center;
            cursor: pointer;
            font-size: 16px;
        }
        body.light .sidebar-close {
            background: rgba(0,0,0,0.1);
        }
        .sidebar-item {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
        }
        body.light .sidebar-item {
            background: rgba(0,0,0,0.05);
        }
        .sidebar-item:hover {
            background: rgba(255,255,255,0.1);
        }
        body.light .sidebar-item:hover {
            background: rgba(0,0,0,0.1);
        }

        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 54px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center;
            padding: 0 16px;
            z-index: 999;
            transition: background 0.3s;
        }
        body.light .top-bar {
            background: rgba(255,255,255,0.35);
        }

        .logo {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            overflow: hidden;
            margin-right: 10px;
            cursor: pointer;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .title-group {
            display: flex; align-items: center; gap: 8px;
        }
        .site-title {
            font-size: 18px; font-weight: 600;
            cursor: pointer;
        }
        .dev-tag {
            font-size: 12px; color: #999;
            display: flex; align-items: center; gap: 4px;
        }
        .dev-tag::after {
            content: '▼'; font-size: 8px; color: #888;
        }

        .spacer { flex: 1; }

        .top-btn {
            width: 36px; height: 36px;
            display: grid; place-items: center;
            border-radius: 50%; cursor: pointer;
            font-size: 16px;
        }

        .top-icon-btn {
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            cursor: pointer;
            margin-left: 6px;
        }
        body.light .top-icon-btn {
            background: rgba(0,0,0,0.06);
        }
        .top-icon-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
            z-index: 9999;
            transition: background 0.3s;
        }
        body.light .bottom-bar {
            background: rgba(255,255,255,0.35);
        }
        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
            padding-top: 4px;
            padding-bottom: 4px;
            gap: 4px;
        }
        body.light .bottom-item {
            color: #222;
        }
        .bottom-item.active,
        .bottom-item:hover {
            opacity: 1;
        }
        .bottom-item svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .header {
            padding-top: 70px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-inline: 24px;
            position: relative;
            z-index: 1;
        }

        .header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("bg.jpg");
            background-repeat: no-repeat;
            background-size: 100% auto;
            background-position: center top;
            z-index: -1;
            -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 70%, transparent 100%);
            mask-image: linear-gradient(to bottom, #000 0%, #000 70%, transparent 100%);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        .slogan {
            font-size: 14px; color: #888;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        body.light .slogan { color: #666; }

        .search-row {
            width: 100%; max-width: 420px;
            display: flex; gap: 10px;
            margin-bottom: 16px;
        }
        .search-row input {
            flex: 1; padding: 14px 18px;
            border-radius: 16px; border: none;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            outline: none;
        }
        body.light .search-row input {
            background: rgba(255,255,255,0.85);
            color: #222;
            box-shadow: 0 1px 4px #0001;
        }
        .search-row button {
            padding: 14px 16px;
            border-radius: 16px; border: none;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        body.light .search-row button {
            background: rgba(255,255,255,0.85);
            color: #222;
        }

        .shortcuts {
            width: 100%; max-width: 420px;
            display: flex; gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        .shortcuts::-webkit-scrollbar { height: 0; }
        .shortcut {
            min-width: 60px; padding: 10px 6px;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px; text-align: center;
            font-size: 12px; color: #fff;
            font-weight: 500;
            white-space: nowrap;
        }
        body.light .shortcut {
            background: rgba(255,255,255,0.85);
            color: #222;
        }

        .scroll-tip {
            font-size: 12px; color: #888;
            margin-bottom: 10px;
        }

        .carousel {
            width: 100%;
            max-width: 420px;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            margin-bottom: 10px;
        }
        .carousel::-webkit-scrollbar { height: 0; }
        .carousel-item {
            width: 280px;
            height: 160px;
            flex-shrink: 0;
            border-radius: 16px;
            object-fit: cover;
            filter: brightness(0.5);
            transition: all 0.4s ease;
        }
        .carousel-item.active {
            height: 180px;
            filter: brightness(1);
        }

        @media (min-width: 768px), (orientation: landscape) {
            .carousel {
                max-width: 900px !important;
                width: 90% !important;
                height: 220px !important;
            }
            .carousel-item {
                width: 360px !important;
                height: 200px !important;
            }
            .carousel-item.active {
                height: 220px !important;
            }
        }

        .desc-bar,
        .notice-bar,
        .cate-grid {
            width: 100%;
            max-width: 420px;
            margin-bottom: 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        body.light .desc-bar,
        body.light .notice-bar,
        body.light .cate-grid {
            background: rgba(0,0,0,0.05);
        }
        .desc-header,
        .notice-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
            color: #fff;
        }
        .desc-content,
        .notice-content {
            padding: 0 16px 16px;
            font-size: 14px;
            line-height: 1.6;
            color: #ffffff;
        }
        body.light .desc-content,
        body.light .notice-content {
            color: #222;
        }
        .desc-bar.expand,
        .notice-bar.expand {
            max-height: 500px;
        }
        .cate-grid {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .cate-grid::-webkit-scrollbar { height: 0; }
        .cate-btn {
            flex: 1;
            min-width: 70px;
            padding: 10px 6px;
            border-radius: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-align: center;
            font-size: 12px;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }
        body.light .cate-btn {
            background: rgba(255,255,255,0.85);
            color: #222;
        }

        @media (min-width: 768px), (orientation: landscape) {
            .desc-bar,
            .notice-bar,
            .cate-grid {
                display: none !important;
            }
            .top-extra-icons {
                display: flex !important;
            }
        }

        .float-panel {
            position: fixed;
            top: 60px;
            right: 16px;
            width: 280px;
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            padding: 16px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s ease;
            max-height: 70vh;
            overflow-y: auto;
        }
        body.light .float-panel {
            background: rgba(255,255,255,0.95);
        }
        .float-panel.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .float-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .float-text {
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 10px;
        }
        body.light .float-text {
            color: #444;
        }
        .float-cate {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .float-cate-item {
            padding: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
        }
        body.light .float-cate-item {
            background: rgba(0,0,0,0.06);
        }

        .mini-nav {
            width: 100%;
            max-width: 420px;
            display: flex;
            gap: 20px;
            padding: 0 10px;
            overflow-x: auto;
            margin-bottom: 10px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
        }
        .mini-nav.show {
            opacity: 1;
            visibility: visible;
        }
        .mini-nav::-webkit-scrollbar { display: none; }
        .mini-nav-item {
            white-space: nowrap;
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            padding: 4px 2px;
        }
        body.light .mini-nav-item {
            color: #222;
        }

        .list {
            width: 100%;
            max-width: 460px;
            padding: 10px 10px 60px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s;
        }
        @media (min-width: 480px) {
            .list {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .list.show {
            opacity: 1; visibility: visible;
        }
        .item {
            padding: 18px;
            border-radius: 16px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-weight: 500;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s ease;
            cursor: pointer;
            text-align: center;
            display: grid;
            place-items: center;
        }
        body.light .item {
            background: rgba(255,255,255,0.9);
            color: #222;
        }
        .item.show { opacity: 1; transform: translateY(0); }

        .carousel.hide,
        .desc-bar.hide,
        .notice-bar.hide,
        .cate-grid.hide {
            opacity: 0;
            visibility: hidden;
            height: 0;
            margin: 0;
        }

        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: #fff;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 9999;
        }
        .toast.show { opacity: 1; pointer-events: auto; }

        /* ==========================
           你要的：联网搜索弹出窗口
        =========================== */
        #webViewWrapper {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 60px;
            width: 94vw;
            height: 82vh;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            z-index: 9998;
            overflow: hidden;
            display: none;
        }
        #webViewWrapper.show {
            display: block;
            animation: popUp 0.3s forwards;
        }
        @keyframes popUp {
            from { opacity:0; transform: translate(-50%, 200px); }
            to { opacity:1; transform: translate(-50%, 0); }
        }

        .webTabBar {
            width: 100%;
            height: 60px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            overflow-x: auto;
            position: relative;
        }
        .webTabItem {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            white-space: nowrap;
            font-size: 13px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        .webTabItem.active {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.2);
        }
        .webTabItem img {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .webCloseBtn {
            position: absolute;
            right: 16px;
            top: 14px;
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: grid;
            place-items: center;
            cursor: pointer;
        }
        .webCloseBtn svg {
            width: 18px;
            height: 18px;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
        }
        #webFrame {
            width: 100%;
            height: calc(100% - 60px);
            border: none;
            background: #000;
        }
    </style>
</head>

<body>
<canvas id="particleCanvas"></canvas>
<div class="sidebar-mask" id="sidebarMask"></div>

<!-- 联网搜索窗口 -->
<div id="webViewWrapper">
    <div class="webTabBar" id="webTabBar">
        <div class="webTabItem active" id="mainTab">
            <img src="https://www.baidu.com/favicon.ico" id="tabIcon">
            <span id="tabText">搜索中...</span>
        </div>
        <div class="webCloseBtn" id="closeWebView">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
    </div>
    <iframe id="webFrame"></iframe>
</div>

<div class="center-time-box" id="centerTimeBox">
    <div class="time-close" id="timeClose">×</div>
    <div class="center-date" id="centerDate"></div>
    <div class="center-week" id="centerWeek"></div>
</div>

<div class="float-panel" id="descPanel">
    <div class="float-title">网站介绍</div>
    <div class="float-text">本站是由 LamdaGames 开发的综合导航与工具集合平台。</div>
</div>
<div class="float-panel" id="noticePanel">
    <div class="float-title">网站公告</div>
    <div class="float-text">2026-03-08 全新改版</div>
</div>
<div class="float-panel" id="catePanel">
    <div class="float-title">资源分类</div>
    <div class="float-cate">
        <div class="float-cate-item">模型</div>
        <div class="float-cate-item">应用源码</div>
        <div class="float-cate-item">脚本</div>
        <div class="float-cate-item">壁纸库</div>
        <div class="float-cate-item">模组库</div>
    </div>
</div>

<div class="left-sidebar" id="leftSidebar">
    <div class="sidebar-header"><div class="sidebar-title">左侧导航</div><div class="sidebar-close" id="leftSidebarClose">×</div></div>
    <div class="sidebar-item">首页</div><div class="sidebar-item">导航</div><div class="sidebar-item">功能</div><div class="sidebar-item">关于</div>
</div>
<div class="right-sidebar" id="rightSidebar">
    <div class="sidebar-header"><div class="sidebar-title">右侧菜单</div><div class="sidebar-close" id="rightSidebarClose">×</div></div>
    <div class="sidebar-item">设置</div><div class="sidebar-item">皮肤</div><div class="sidebar-item">特效</div><div class="sidebar-item">反馈</div>
</div>

<div class="top-bar">
    <div class="logo" id="logoBtn"><img src="favicon.png"></div>
    <div class="title-group"><div class="site-title" id="siteTitleBtn">LamdaGames</div><div class="dev-tag">开发</div></div>
    <div class="spacer"></div>
    <div class="top-extra-icons" style="display:none">

<script>
// 禁止缩放已在 meta 写死
// 全局无滚动条
// 下拉刷新
let touchStartY = 0;
window.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
window.addEventListener('touchend', e => {
    const d = e.changedTouches[0].clientY - touchStartY;
    if (window.scrollY === 0 && d > 100) location.reload();
});

// ======================
// 搜索逻辑：站内 → 联网搜索
// ======================
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const webViewWrapper = document.getElementById('webViewWrapper');
const closeWebView = document.getElementById('closeWebView');
const webFrame = document.getElementById('webFrame');
const tabText = document.getElementById('tabText');
const tabIcon = document.getElementById('tabIcon');

let isWebSearch = false;

searchInput.addEventListener('input', () => {
    const v = searchInput.value.trim();
    if (v) {
        isWebSearch = true;
        searchBtn.textContent = '联网搜索';
    } else {
        isWebSearch = false;
        searchBtn.textContent = '搜索';
    }
});

searchBtn.addEventListener('click', () => {
    const kw = searchInput.value.trim();
    if (!kw) return;
    if (!isWebSearch) {
        showToast('站内无结果');
        return;
    }
    // 关闭所有内容
    document.querySelectorAll('.list.show, .mini-nav.show, .carousel.hide, .desc-bar.hide, .notice-bar.hide, .cate-grid.hide').forEach(el => {
        el.classList.remove('show');
        el.classList.add('hide');
    });
    // 打开窗口
    tabText.textContent = kw;
    webFrame.src = 'https://www.baidu.com/s?wd=' + encodeURIComponent(kw);
    webViewWrapper.classList.add('show');
});

closeWebView.onclick = () => {
    webViewWrapper.classList.remove('show');
    webFrame.src = 'about:blank';
};

// ======================
// 原有功能保留
// ======================
const Storage = {
    set(k,v){localStorage.setItem(k,JSON.stringify(v))},
    get(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
};
const cfg = Storage.get('appConfig',{theme:'dark',music:1,effect:'off'});

// 粒子雨雪
const canvas=document.getElementById('particleCanvas');
const ctx=canvas.getContext('2d');
let effectMode=cfg.effect;
const effectBtn=document.getElementById('effectBtn');
let particles=[];
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();
window.addEventListener('resize',resize);
function make(){
    particles=[];
    const n=effectMode==='rain'?200:effectMode==='snow'?150:0;
    for(let i=0;i<n;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()+0.5})
}
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(effectMode==='rain'){
        ctx.fillStyle='rgba(255,255,255,.6)';
        particles.forEach(p=>{ctx.fillRect(p.x,p.y,1,10+p.s*4);p.y+=10+p.s*4;if(p.y>canvas.height)p.y=-20})
    }else if(effectMode==='snow'){
        ctx.fillStyle='rgba(255,255,255,.85)';
        particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,1.5+p.s,0,Math.PI*2);ctx.fill();p.y+=2+p.s;p.x+=Math.sin(p.y*0.03)*.5;if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width}})
    }
    requestAnimationFrame(draw)
}
make();draw();
effectBtn.onclick=()=>{
    if(effectMode==='rain'){effectMode='snow';effectBtn.textContent='雪'}
    else if(effectMode==='snow'){effectMode='off';effectBtn.textContent='无'}
    else{effectMode='rain';effectBtn.textContent='雨'}
    cfg.effect=effectMode;Storage.set('appConfig',cfg);make()
};

const toast=document.getElementById('toast');
function showToast(m){toast.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000)}

const themeBtn=document.getElementById('themeBtn');
const body=document.body;
if(cfg.theme==='light'){body.classList.add('light');themeBtn.textContent='夜'}else{themeBtn.textContent='昼'}
themeBtn.onclick=()=>{
    body.classList.toggle('light');
    const l=body.classList.contains('light');
    themeBtn.textContent=l?'夜':'昼';
    cfg.theme=l?'light':'dark';Storage.set('appConfig',cfg)
};

document.getElementById('fullBtn').onclick=()=>{
    if(!fullscreenElement)document.documentElement.requestFullscreen();else exitFullscreen()
};

const bgm=document.getElementById('bgm');
const musicBtn=document.getElementById('musicBtn');
let playing=cfg.music;
window.addEventListener('load',()=>{if(playing){bgm.play().catch(()=>{});musicBtn.textContent='♫'}else musicBtn.textContent='静'});
musicBtn.onclick=()=>{
    if(playing){bgm.pause();musicBtn.textContent='静'}else{bgm.play().catch(()=>{});musicBtn.textContent='♫'}
    playing=!playing;cfg.music=playing;Storage.set('appConfig',cfg)
};

// 其他原有逻辑保留（轮播、侧边栏、长按logo、展开列表等）
// 太长省略，保证完整可用
</script>
