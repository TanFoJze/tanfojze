<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>TanFoJze-xsx2024:开发者个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body {
            background-color: #252525;
            color: #fff;
            font-family: system-ui, sans-serif;
        }

        /* ========== 全屏视频背景 ========== */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 视频底部渐变，和背景融合 */
        .video-fade {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            background: linear-gradient(to top, #252525, transparent);
            pointer-events: none;
        }

        /* ========== 标题区域 在视频上层 ========== */
        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 70px 24px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 12px;
            color: #fff;
        }

        .slogan {
            font-size: 17px;
            color: #ccc;
            margin-bottom: 28px;
        }

        /* 搜索框 */
        .search-row {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 420px;
            margin: 0 auto 22px;
        }
        .search-row input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            outline: none;
            font-size: 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
        }
        .search-row button {
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
        }

        /* 上滑提示 */
        .scroll-tip {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin: 10px auto 36px;
            animation: fadeUpDown 2s infinite alternate;
        }
        @keyframes fadeUpDown {
            from { opacity: 0.5; transform: translateY(0); }
            to   { opacity: 1; transform: translateY(-6px); }
        }

        /* GIF 区域 */
        .gif-box {
            width: 100%;
            max-width: 280px;
            margin: 0 auto 40px;
            text-align: center;
            transition: all 0.5s ease;
            opacity: 1;
            visibility: visible;
        }
        .gif-box.hide {
            opacity: 0;
            visibility: hidden;
            height: 0;
            margin: 0;
        }
        .gif-box img {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        /* 选项列表 */
        .list {
            padding: 10px 22px 60px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            z-index: 2;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
        }
        .list.show {
            opacity: 1;
            visibility: visible;
        }

        .item {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 22px;
            border-radius: 16px;
            transition: all 0.5s ease;
            opacity: 0;
            transform: translateY(60px);
        }
        .item.show {
            opacity: 1;
            transform: translateY(0);
        }
        .item:hover {
            background: rgba(255,255,255,0.13);
            transform: scale(1.02);
        }
        .item.left-long {
            width: 76%;
            align-self: flex-start;
        }
        .item.right-long {
            width: 76%;
            align-self: flex-end;
        }

        /* 提示弹窗 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            background: rgba(255, 80, 80, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>

<!-- ========== 视频背景 ========== -->
<div class="video-container">
    <video autoplay muted loop playsinline>
        <source src="tajps000background.mp4" type="video/mp4">
    </video>
    <div class="video-fade"></div>
</div>

<!-- 提示框 -->
<div class="toast" id="toast">该内容不存在</div>

<!-- 标题区域（在视频上面） -->
<div class="header">
    <h1>TanFoJze - 开发者个人主页</h1>
    <div class="slogan">明天会更好，向往美好</div>

    <div class="search-row">
        <input type="text" id="searchInput" placeholder="搜索...">
        <button id="searchBtn">搜索</button>
    </div>

    <div class="scroll-tip">↑ 向上滑动探索更多</div>

    <!-- GIF 文件名改为 jh000.gif -->
    <div class="gif-box" id="gifBox">
        <img src="jh000.gif" alt="animation">
    </div>
</div>

<!-- 选项列表 -->
<div class="list" id="list">
    <div class="item left-long">选项 01</div>
    <div class="item right-long">选项 02</div>
    <div class="item left-long">选项 03</div>
    <div class="item right-long">选项 04</div>
    <div class="item left-long">选项 05</div>
    <div class="item right-long">选项 06</div>
    <div class="item left-long">选项 07</div>
    <div class="item right-long">选项 08</div>
    <div class="item left-long">选项 09</div>
    <div class="item right-long">选项 10</div>
    <div class="item left-long">选项 11</div>
    <div class="item right-long">选项 12</div>
    <div class="item left-long">选项 13</div>
    <div class="item right-long">选项 14</div>
    <div class="item left-long">选项 15</div>
    <div class="item right-long">选项 16</div>
    <div class="item left-long">选项 17</div>
    <div class="item right-long">选项 18</div>
    <div class="item left-long">选项 19</div>
    <div class="item right-long">选项 20</div>
</div>

<script>
    // 搜索
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const toast = document.getElementById('toast');
    let toastTimer;

    function showToast() {
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }
    function doSearch() {
        if (searchInput.value.trim()) showToast();
    }
    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
    });

    // 滑动控制
    const gifBox = document.getElementById('gifBox');
    const list = document.getElementById('list');
    const items = document.querySelectorAll('.item');
    let currentItem = 0;

    window.addEventListener('scroll', () => {
        if (window.scrollY > 80) {
            gifBox.classList.add('hide');
            list.classList.add('show');
            showItems();
        } else {
            gifBox.classList.remove('hide');
            list.classList.remove('show');
            resetItems();
        }
    });

    function showItems() {
        if (currentItem >= items.length) return;
        const rect = items[currentItem].getBoundingClientRect();
        if (rect.top < window.innerHeight - 80) {
            items[currentItem].classList.add('show');
            currentItem++;
            setTimeout(showItems, 140);
        }
    }

    function resetItems() {
        items.forEach(i => i.classList.remove('show'));
        currentItem = 0;
    }
</script>

</body>
</html>
