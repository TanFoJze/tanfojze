<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>TanFoJze-xsx2024:开发者个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            background-color: #252525;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-bottom: 60px;
        }

        /* 背景流光 */
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #383838 0%, #252525 50%, #1a1a1a 100%);
            z-index: -2;
        }

        .light {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(100,181,246,0.08), transparent 50%);
            filter: blur(40px);
            animation: lightMove 12s linear infinite alternate;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes lightMove {
            0% { transform: translate(0,0) scale(1); }
            50% { transform: translate(10px,-10px) scale(1.1); }
            100% { transform: translate(-10,10px) scale(1); }
        }

        .header {
            text-align: center;
            padding: 70px 24px 20px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 12px;
            color: #fff;
            font-weight: 600;
        }

        .slogan {
            font-size: 17px;
            color: #ccc;
            margin-bottom: 28px;
        }

        /* 搜索框 + 按钮 */
        .search-row {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 420px;
            margin: 0 auto 22px;
        }

        .search-row input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            outline: none;
            font-size: 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .search-row input:focus {
            background: rgba(255,255,255,0.12);
            border-color: rgba(100,181,246,0.3);
        }

        .search-row button {
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            backdrop-filter: blur(20px);
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-row button:hover {
            background: rgba(255,255,255,0.15);
        }

        /* 上滑提示 */
        .scroll-tip {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin: 10px auto 36px;
            opacity: 0.8;
            animation: fadeUpDown 2s infinite alternate ease-in-out;
        }

        @keyframes fadeUpDown {
            from { opacity: 0.5; transform: translateY(0); }
            to   { opacity: 1; transform: translateY(-6px); }
        }

        /* 3D 地球 + 月球 容器 */
        .globe-container {
            position: relative;
            width: 100%;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            perspective: 1000px;
        }

        /* 3D 地球 */
        .globe {
            position: relative;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid rgba(130, 170, 255, 0.2);
            transform-style: preserve-3d;
            animation: rotateGlobe 25s linear infinite;
        }

        @keyframes rotateGlobe {
            0% { transform: rotateY(0deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }

        /* 经线 */
        .globe .meridian {
            position: absolute;
            top: 0; left: 50%;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(130, 170, 255, 0.35);
            border-radius: 50%;
            transform-style: preserve-3d;
        }

        .m1 { transform: translateX(-50%) rotateY(0deg); }
        .m2 { transform: translateX(-50%) rotateY(30deg); }
        .m3 { transform: translateX(-50%) rotateY(60deg); }
        .m4 { transform: translateX(-50%) rotateY(90deg); }

        /* 纬线 */
        .globe .parallel {
            position: absolute;
            top: 50%; left: 0;
            width: 100%;
            height: 0;
            border-top: 1px solid rgba(130, 170, 255, 0.25);
            transform-style: preserve-3d;
        }

        .p1 { transform: translateY(-50%) rotateX(60deg); }
        .p2 { transform: translateY(-50%) rotateX(30deg); }
        .p3 { transform: translateY(-50%) rotateX(0deg); }
        .p4 { transform: translateY(-50%) rotateX(-30deg); }

        /* 星环 */
        .ring {
            position: absolute;
            width: 240px;
            height: 240px;
            border: 2px solid rgba(130, 170, 255, 0.15);
            border-radius: 50%;
            transform-style: preserve-3d;
            transform: rotateX(75deg);
            animation: rotateRing 35s linear infinite;
        }

        @keyframes rotateRing {
            0% { transform: rotateX(75deg) rotateZ(0deg); }
            100% { transform: rotateX(75deg) rotateZ(360deg); }
        }

        /* 3D 月球 */
        .moon {
            position: absolute;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(200, 200, 220, 0.4);
            top: 20px;
            right: 50px;
            transform-style: preserve-3d;
            animation: rotateMoon 18s linear infinite;
        }

        @keyframes rotateMoon {
            0% { transform: rotateY(0deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }

        .moon .m-line {
            position: absolute;
            top: 0; left: 50%;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(200, 200, 220, 0.25);
            border-radius: 50%;
            transform: translateX(-50%);
        }

        /* 卡片列表 */
        .list {
            padding: 10px 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            z-index: 2;
        }

        .item {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 22px;
            border-radius: 16px;
            font-size: 16px;
            backdrop-filter: blur(20px);
            transition: all 0.5s ease;
            opacity: 0;
            transform: translateY(60px);
        }

        .item.show {
            opacity: 1;
            transform: translateY(0);
        }

        .item:hover {
            background: rgba(255,255,255,0.13);
            border-color: rgba(100,181,246,0.2);
            transform: scale(1.02);
        }

        .item.left-long {
            width: 76%;
            align-self: flex-start;
        }

        .item.right-long {
            width: 76%;
            align-self: flex-end;
        }

        /* 顶部提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            background: rgba(255, 80, 80, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 999;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: all 0.4s ease;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>

<div class="bg"></div>
<div class="light"></div>
<div class="toast" id="toast">该内容不存在</div>

<div class="header">
    <h1>TanFoJze - 开发者个人主页</h1>
    <div class="slogan">明天会更好，向往美好</div>

    <div class="search-row">
        <input type="text" id="searchInput" placeholder="搜索...">
        <button id="searchBtn">搜索</button>
    </div>

    <div class="scroll-tip">↑ 向上滑动探索更多</div>

    <!-- 3D 地球 + 星环 + 月球 -->
    <div class="globe-container">
        <div class="ring"></div>
        <div class="globe">
            <div class="meridian m1"></div>
            <div class="meridian m2"></div>
            <div class="meridian m3"></div>
            <div class="meridian m4"></div>
            <div class="parallel p1"></div>
            <div class="parallel p2"></div>
            <div class="parallel p3"></div>
            <div class="parallel p4"></div>
        </div>
        <div class="moon">
            <div class="m-line"></div>
            <div class="m-line" style="transform: translateX(-50%) rotateY(90deg)"></div>
        </div>
    </div>
</div>

<div class="list" id="list">
    <div class="item left-long">选项 01</div>
    <div class="item right-long">选项 02</div>
    <div class="item left-long">选项 03</div>
    <div class="item right-long">选项 04</div>
    <div class="item left-long">选项 05</div>
    <div class="item right-long">选项 06</div>
    <div class="item left-long">选项 07</div>
    <div class="item right-long">选项 08</div>
    <div class="item left-long">选项 09</div>
    <div class="item right-long">选项 10</div>
    <div class="item left-long">选项 11</div>
    <div class="item right-long">选项 12</div>
    <div class="item left-long">选项 13</div>
    <div class="item right-long">选项 14</div>
    <div class="item left-long">选项 15</div>
    <div class="item right-long">选项 16</div>
    <div class="item left-long">选项 17</div>
    <div class="item right-long">选项 18</div>
    <div class="item left-long">选项 19</div>
    <div class="item right-long">选项 20</div>
</div>

<script>
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const toast = document.getElementById('toast');
    const items = document.querySelectorAll('.item');
    let current = 0;
    let toastTimer = null;

    function showToast() {
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    function hideToast() {
        toast.classList.remove('show');
        clearTimeout(toastTimer);
    }

    function doSearch() {
        const val = searchInput.value.trim();
        if (!val) return;
        showToast();
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
    });

    let startX = 0;
    toast.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
    });
    toast.addEventListener('touchmove', e => {
        const x = e.touches[0].clientX;
        if (Math.abs(x - startX) > 50) hideToast();
    });

    // 边滑边逐个弹出
    function showOneByOne() {
        if (current >= items.length) return;
        const el = items[current];
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight - 80) {
            el.classList.add('show');
            current++;
            setTimeout(showOneByOne, 140);
        }
    }

    window.addEventListener('scroll', showOneByOne);
    showOneByOne();
</script>

</body>
</html>
