<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>TanFoJze-xsx2024:开发者个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body {
            background-color: #252525;
            color: #fff;
            font-family: system-ui, sans-serif;
            padding-bottom: 60px;
        }

        /* 流畅背景 */
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #252525;
            z-index: -2;
        }

        .header {
            text-align: center;
            padding: 70px 24px 20px;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 12px;
            color: #fff;
        }
        .slogan {
            font-size: 17px;
            color: #ccc;
            margin-bottom: 28px;
        }

        /* 搜索框 */
        .search-row {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 420px;
            margin: 0 auto 22px;
        }
        .search-row input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            outline: none;
            font-size: 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
        }
        .search-row button {
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
        }

        /* 上滑提示 */
        .scroll-tip {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin: 10px auto 36px;
            animation: fadeUpDown 2s infinite alternate;
        }
        @keyframes fadeUpDown {
            from { opacity: 0.5; transform: translateY(0); }
            to   { opacity: 1; transform: translateY(-6px); }
        }

        /* ========== GIF 区域：流畅播放优化 ========== */
        .gif-box {
            width: 100%;
            max-width: 280px;
            margin: 0 auto 40px;
            text-align: center;
        }
        .gif-box img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            /* 保证 GIF 流畅播放 */
            image-rendering: auto;
            transform: translateZ(0);
        }

        /* 列表 */
        .list {
            padding: 10px 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            z-index: 2;
        }
        .item {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 22px;
            border-radius: 16px;
            transition: all 0.5s ease;
            opacity: 0;
            transform: translateY(60px);
        }
        .item.show {
            opacity: 1;
            transform: translateY(0);
        }
        .item:hover {
            background: rgba(255,255,255,0.13);
            transform: scale(1.02);
        }
        .item.left-long {
            width: 76%;
            align-self: flex-start;
        }
        .item.right-long {
            width: 76%;
            align-self: flex-end;
        }

        /* 提示弹窗 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            background: rgba(255, 80, 80, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>

<div class="bg"></div>
<div class="toast" id="toast">该内容不存在</div>

<div class="header">
    <h1>TanFoJze - 开发者个人主页</h1>
    <div class="slogan">明天会更好，向往美好</div>

    <div class="search-row">
        <input type="text" id="searchInput" placeholder="搜索...">
        <button id="searchBtn">搜索</button>
    </div>

    <div class="scroll-tip">↑ 向上滑动探索更多</div>

    <!-- ========== 你的 GIF，无限循环 + 流畅播放 ========== -->
    <div class="gif-box">
        <img src="planet.gif" alt="animation">
    </div>
</div>

<div class="list">
    <div class="item left-long">选项 01</div>
    <div class="item right-long">选项 02</div>
    <div class="item left-long">选项 03</div>
    <div class="item right-long">选项 04</div>
    <div class="item left-long">选项 05</div>
    <div class="item right-long">选项 06</div>
    <div class="item left-long">选项 07</div>
    <div class="item right-long">选项 08</div>
    <div class="item left-long">选项 09</div>
    <div class="item right-long">选项 10</div>
    <div class="item left-long">选项 11</div>
    <div class="item right-long">选项 12</div>
    <div class="item left-long">选项 13</div>
    <div class="item right-long">选项 14</div>
    <div class="item left-long">选项 15</div>
    <div class="item right-long">选项 16</div>
    <div class="item left-long">选项 17</div>
    <div class="item right-long">选项 18</div>
    <div class="item left-long">选项 19</div>
    <div class="item right-long">选项 20</div>
</div>

<script>
    // 搜索
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const toast = document.getElementById('toast');
    let toastTimer;

    function showToast() {
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }
    function doSearch() {
        if (searchInput.value.trim()) showToast();
    }
    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
    });

    // 滑动逐个显示
    const items = document.querySelectorAll('.item');
    let current = 0;
    function showOneByOne() {
        if (current >= items.length) return;
        const rect = items[current].getBoundingClientRect();
        if (rect.top < window.innerHeight - 80) {
            items[current].classList.add('show');
            current++;
            setTimeout(showOneByOne, 140);
        }
    }
    window.addEventListener('scroll', showOneByOne);
    showOneByOne();
</script>

</body>
</html>
