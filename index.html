<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LamdaGames Tanfojze</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        body {
            background: #121212;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background 0.3s;
        }
        body.light {
            background: #f6f6f6;
            color: #222;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 998;
        }

        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 54px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            display: flex; align-items: center;
            padding: 0 16px;
            z-index: 999;
            transition: background 0.3s;
        }
        body.light .top-bar {
            background: rgba(255,255,255,0.85);
        }

        .logo {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            overflow: hidden;
            margin-right: 10px;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .title-group {
            display: flex; align-items: center; gap: 8px;
        }
        .site-title {
            font-size: 18px; font-weight: 600;
        }
        .dev-tag {
            font-size: 12px; color: #999;
            display: flex; align-items: center; gap: 4px;
        }
        .dev-tag::after {
            content: '▼'; font-size: 8px; color: #888;
        }

        .spacer { flex: 1; }

        .top-btn {
            width: 36px; height: 36px;
            display: grid; place-items: center;
            border-radius: 50%; cursor: pointer;
            font-size: 16px;
        }

        .header {
            padding-top: 70px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-inline: 24px;
            position: relative;
            z-index: 1;
        }

        .header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("bg.jpg");
            background-repeat: no-repeat;
            background-size: 100% auto;
            background-position: center top;
            z-index: -1;
            -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 70%, transparent 100%);
            mask-image: linear-gradient(to bottom, #000 0%, #000 70%, transparent 100%);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        .slogan {
            font-size: 14px; color: #888;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        body.light .slogan { color: #666; }

        .search-row {
            width: 100%; max-width: 420px;
            display: flex; gap: 10px;
            margin-bottom: 16px;
        }
        .search-row input {
            flex: 1; padding: 14px 18px;
            border-radius: 16px; border: none;
            background: rgba(255,255,255,0.15);
            color: #fff; font-size: 16px; outline: none;
        }
        body.light .search-row input {
            background: #fff; color: #222;
            box-shadow: 0 1px 4px #0001;
        }
        .search-row button {
            padding: 14px 16px;
            border-radius: 16px; border: none;
            background: rgba(255,255,255,0.15);
            color: #fff; cursor: pointer;
        }
        body.light .search-row button {
            background: #fff; color: #222;
        }

        .shortcuts {
            width: 100%; max-width: 420px;
            display: flex; gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .shortcuts::-webkit-scrollbar { height: 0; }
        .shortcut {
            min-width: 60px; padding: 10px 6px;
            background: rgba(255,255,255,0.12);
            border-radius: 12px; text-align: center;
            font-size: 12px; color: #ccc;
            white-space: nowrap;
        }
        body.light .shortcut {
            background: #fff; color: #444;
        }

        .scroll-tip {
            font-size: 12px; color: #888;
            margin-bottom: 10px;
        }

        .carousel {
            width: 100%;
            max-width: 420px;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            margin-bottom: 10px;
        }
        .carousel::-webkit-scrollbar { height: 0; }
        .carousel-item {
            width: 280px;
            height: 160px;
            flex-shrink: 0;
            border-radius: 16px;
            object-fit: cover;
            filter: brightness(0.5);
            transition: all 0.4s ease;
        }
        .carousel-item.active {
            height: 180px;
            filter: brightness(1);
        }

        .list {
            padding: 10px 20px 60px;
            display: flex; flex-direction: column; gap: 10px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.6s;
        }
        .list.show {
            opacity: 1; visibility: visible;
        }
        .item {
            padding: 18px; border-radius: 16px;
            background: rgba(255,255,255,0.1);
            opacity: 0; transform: translateY(30px);
            transition: all 0.5s ease;
            cursor: pointer;
        }
        body.light .item { background: #fff; }
        .item.show { opacity: 1; transform: translateY(0); }
        .item.left { width: 85%; align-self: flex-start; }
        .item.right { width: 85%; align-self: flex-end; }

        .carousel.hide {
            opacity: 0; visibility: hidden;
            height: 0; margin: 0;
        }

        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: #fff;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 9999;
        }
        .toast.show { opacity: 1; pointer-events: auto; }
    </style>
</head>

<body>
<canvas id="particleCanvas"></canvas>

<div class="top-bar">
    <div class="logo">
        <img src="favicon.png" alt="Logo">
    </div>
    <div class="title-group">
        <div class="site-title">LamdaGames</div>
        <div class="dev-tag">开发人员</div>
    </div>
    <div class="spacer"></div>

    <div class="top-btn" id="musicBtn">静</div>
    <div class="top-btn" id="effectBtn">无</div>
    <div class="top-btn" id="themeBtn">昼</div>
    <div class="top-btn" id="fullBtn">⛶</div>
    <div class="top-btn menu-toggle">☰</div>
</div>

<div class="toast" id="toast">该内容不存在</div>

<div class="header">
    <h1>TanFoJze</h1>
    <div class="slogan">x仕x.Looking forward to tomorrow</div>

    <div class="search-row">
        <input placeholder="搜索..." type="text" id="searchInput">
        <button id="searchBtn">搜索</button>
    </div>

    <div class="shortcuts">
        <div class="shortcut">应用</div>
        <div class="shortcut">开源</div>
        <div class="shortcut">终端</div>
        <div class="shortcut">资源</div>
        <div class="shortcut">图片</div>
        <div class="shortcut">网站</div>
        <div class="shortcut">更多</div>
    </div>

    <div class="scroll-tip">︿ 向上滑动展开列表</div>

    <div class="carousel" id="carousel">
        <img src="jh000gif.gif" class="carousel-item active">
        <img src="jh000gif.gif" class="carousel-item">
        <img src="jh000gif.gif" class="carousel-item">
    </div>
</div>

<div class="list" id="list">
    <div class="item left" onclick="window.open('https://gatehumex.com','_blank')">Gatehumex</div>
    <div class="item right" onclick="window.open('https://tranzelo-eternal.com','_blank')">Tranzelo-Eternal</div>
    <div class="item left" onclick="window.open('https://tranzelo-endless.com','_blank')">Tranzelo-Endless</div>
    <div class="item right" onclick="window.open('https://tranzello-immortal.com','_blank')">Tranzello-Immortal</div>
    <div class="item left" onclick="window.open('https://fishbone-engine.com','_blank')">Fishbone Engine</div>
    <div class="item right" onclick="window.open('https://github.com/tanfo','_blank')">TanFo's Github</div>
    <div class="item left" onclick="window.open('https://operator-api.com','_blank')">Operator API</div>
    <div class="item right" onclick="window.open('https://tfj-pan.com','_blank')">TFJ云盘下载服务</div>
    <div class="item left" onclick="window.open('https://my-collection.com','_blank')">收藏网站集合</div>
    <div class="item right" onclick="window.open('https://resource-box.com','_blank')">资源box</div>
    <div class="item left" onclick="window.open('https://tanfojze-dev.com','_blank')">Tanfojze开发者服务 移动端下载</div>
    <div class="item right" onclick="window.open('https://contact-me.com','_blank')">我的联系方式</div>
    <div class="item left" onclick="window.open('https://tools.tanfojze.com','_blank')">网站小工具</div>
</div>

<audio id="bgm" loop preload="auto">
    <source src="bgm.mp3" type="audio/mpeg">

<script>
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let effectMode = 'off';
    const effectBtn = document.getElementById('effectBtn');
    let particles = [];
    let animating = true;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function createParticles() {
        particles = [];
        let count = 0;
        if (effectMode === 'rain') count = 200;
        if (effectMode === 'snow') count = 150;
        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() + 0.5
            });
        }
    }

    function draw() {
        if (!animating) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (effectMode !== 'off') {
            if (effectMode === 'rain') {
                ctx.fillStyle = 'rgba(255,255,255,0.55)';
                particles.forEach(p => {
                    ctx.fillRect(p.x, p.y, 1.2, 10 + p.s * 4);
                    p.y += 10 + p.s * 4;
                    if (p.y > canvas.height) p.y = -30;
                });
            } else {
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 1.8 + p.s, 0, Math.PI * 2);
                    ctx.fill();
                    p.y += 2 + p.s;
                    p.x += Math.sin(p.y * 0.03) * 0.6;
                    if (p.y > canvas.height) {
                        p.y = -10;
                        p.x = Math.random() * canvas.width;
                    }
                });
            }
        }
        requestAnimationFrame(draw);
    }

    function startAnim() {
        if (!animating) {
            animating = true;
            draw();
        }
    }

    createParticles();
    draw();

    effectBtn.onclick = () => {
        if (effectMode === 'rain') {
            effectMode = 'snow';
            effectBtn.textContent = '雪';
        } else if (effectMode === 'snow') {
            effectMode = 'off';
            effectBtn.textContent = '无';
        } else {
            effectMode = 'rain';
            effectBtn.textContent = '雨';
        }
        createParticles();
        startAnim();
    };

    const toast = document.getElementById('toast');
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    searchBtn.onclick = () => {
        showToast('该内容不存在');
    };

    const themeBtn = document.getElementById('themeBtn');
    themeBtn.onclick = () => {
        document.body.classList.toggle('light');
        themeBtn.textContent = document.body.classList.contains('light') ? '夜' : '昼';
    };

    const fullBtn = document.getElementById('fullBtn');
    fullBtn.onclick = () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    };

    const bgm = document.getElementById('bgm');
    const musicBtn = document.getElementById('musicBtn');
    let playing = true;
    window.addEventListener('load', () => {
        bgm.play().catch(() => {});
    });
    musicBtn.onclick = () => {
        if (playing) {
            bgm.pause();
            musicBtn.textContent = '停';
        } else {
            bgm.play();
            musicBtn.textContent = '♫';
        }
        playing = !playing;
    };

    const carousel = document.getElementById('carousel');
    function updateActive() {
        const items = document.querySelectorAll('.carousel-item');
        const rect = carousel.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        items.forEach(el => {
            const r = el.getBoundingClientRect();
            const c = r.left + r.width / 2;
            if (Math.abs(c - center) < r.width / 1.5) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
    }
    carousel.addEventListener('scroll', updateActive);
    updateActive();

    const list = document.getElementById('list');
    let cur = 0;
    const items = document.querySelectorAll('.item');
    function showItems() {
        if (cur >= items.length) return;
        items[cur].classList.add('show');
        cur++;
        setTimeout(showItems, 120);
    }
    function resetItems() {
        items.forEach(i => i.classList.remove('show'));
        cur = 0;
    }
    window.addEventListener('scroll', () => {
        if (window.scrollY > 100) {
            carousel.classList.add('hide');
            list.classList.add('show');
            showItems();
        } else {
            carousel.classList.remove('hide');
            list.classList.remove('show');
            resetItems();
        }
    });
</script>
</body>
</html>
