<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#121212;
            color:#fff;
            font-family:system-ui,sans-serif;
            height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            text-align:center;
            padding:0 20px;
        }
        .title{font-size:80px;font-weight:bold;margin-bottom:20px;color:#ff4444;}
        .text{font-size:18px;color:#ccc;margin-bottom:30px;}
        .btn{
            background:#333;
            color:#fff;
            padding:14px 28px;
            border-radius:14px;
            text-decoration:none;
            font-weight:500;
        }
        .btn:hover{background:#444;}
    </style>
</head>
<body>
    <div class="title">404</div>
    <div class="text">你访问的页面不存在或已被删除</div>
    <a class="btn" href="/">返回首页</a>
</body>
</html>
